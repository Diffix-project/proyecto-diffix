name: CI

on:
  push:
    branches: [main, staging, dev]
  pull_request:
    branches: [main, staging, dev]

permissions:
  contents: read

jobs:
  # ─── Backend ──────────────────────────────────────────────────────────────

  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Instalar dependencias
        run: pip install -e ".[dev]"

      - name: Ruff — check
        run: ruff check .

      - name: Ruff — format
        run: ruff format --check .

      - name: Mypy
        run: mypy app

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: vigi
          POSTGRES_PASSWORD: vigi
          POSTGRES_DB: vigitest
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Instalar dependencias
        run: pip install -e ".[dev]"

      - name: Correr migraciones Alembic
        run: alembic upgrade head
        env:
          DATABASE_URL: postgresql+psycopg://vigi:vigi@localhost:5432/vigitest

      - name: Pytest
        run: pytest --tb=short
        env:
          DATABASE_URL: postgresql+psycopg://vigi:vigi@localhost:5432/vigitest
          USE_MOCKS: "true"
          SECRET_KEY: ci-secret-key-not-real
          CLERK_SECRET_KEY: sk_test_fake
          CLERK_WEBHOOK_SECRET: whsec_fake

  # ─── Frontend ─────────────────────────────────────────────────────────────

  lint-frontend:
    name: Lint & Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript check
        run: npm run typecheck

      - name: Build
        run: npm run build

  # ─── Seguridad ────────────────────────────────────────────────────────────

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Secrets scanning en todo el historial del commit
      - name: Gitleaks — secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar herramientas de seguridad Python
        run: pip install bandit pip-audit

      # SAST Python — medium severity en adelante
      - name: Bandit — SAST
        run: bandit -r backend/app --severity-level medium --quiet

      # Vulnerabilidades en dependencias Python
      - name: pip-audit — dependencias Python
        run: |
          pip install -e "backend/.[dev]"
          pip-audit

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: npm install (para audit)
        working-directory: frontend
        run: npm install --package-lock-only

      # Vulnerabilidades en dependencias JS — solo high/critical
      - name: npm audit — dependencias JS
        working-directory: frontend
        run: npm audit --audit-level=high
