# alembic.ini — configuración de Alembic para vigi.ai
# La URL real se inyecta desde env.py via settings.database_url.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Placeholder — sobreescrito por env.py en runtime
sqlalchemy.url = postgresql+psycopg://vigi:vigi@localhost:5432/vigi

[post_write_hooks]
# ruff format automático en migraciones generadas
hooks = ruff_format
ruff_format.type = exec
ruff_format.executable = %(here)s/.venv/Scripts/ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
